name: ci

on:
  push:
  pull_request:

jobs:
  smoke-test:
    name: smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates build-essential clang lld

      - name: install pony compiler
        run: sh .github/scripts/install-ponyc.sh

      - name: run smoke tests
        run: scripts/smoke-test.sh
