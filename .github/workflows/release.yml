name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install build tools
        run: sudo apt-get update && sudo apt-get install -y curl ca-certificates build-essential clang lld

      - name: install pony compiler
        run: sh .github/scripts/install-ponyc.sh

      - name: test
        run: scripts/smoke-test.sh

      - name: package
        run: VERSION="${GITHUB_REF_NAME#v}" TARGET="linux-x86_64" scripts/package.sh

      - name: verify
        run: scripts/verify-release.sh

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lansentinel-*.tar.gz
            dist/*.sha256
