name: release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "existing tag to publish to, for example v0.1.0. leave blank to only build artifacts."
        required: false
        type: string
      publish_release:
        description: "publish assets to the tag release when tag is provided"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: linux x86_64 package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates build-essential clang lld

      - name: install pony compiler
        run: sh .github/scripts/install-ponyc.sh

      - name: build package
        run: |
          if [ -n "${{ inputs.tag || '' }}" ]; then
            version="${{ inputs.tag }}"
            version="${version#v}"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(awk -F'\"' '/^version =/ { print $2; exit }' pony.toml)"
          fi

          VERSION="$version" TARGET="linux-x86_64" scripts/package.sh

      - name: upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lansentinel-linux-x86_64
          path: |
            dist/lansentinel-linux-x86_64.tar.gz
            dist/lansentinel-v*-linux-x86_64.tar.gz
            dist/lansentinel.sha256

      - name: publish github release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.publish_release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist/lansentinel-linux-x86_64.tar.gz
            dist/lansentinel-v*-linux-x86_64.tar.gz
            dist/lansentinel.sha256
          generate_release_notes: true
